<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Site</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    nav {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .nav-logo {
      font-weight: 700;
      font-size: 1.2rem;
      color: #111;
      text-decoration: none;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: #555;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #111;
      border-bottom-color: #111;
    }

    main {
      max-width: 720px;
      margin: 80px auto;
      padding: 0 2rem;
    }

    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p  { color: #555; line-height: 1.6; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">MySite</a>
    <ul class="nav-links">
      <li><a href="/" class="active">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <main>
    <h1>Welcome</h1>
    <p>This page is served statically by Express from the <code>public/</code> folder.</p>
  </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      margin-top: 2rem;
    }

    .contact-card h2 {
      font-size: 1.4rem;
      margin-bottom: 0.4rem;
    }

    .contact-card p {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      padding: 0.65rem 0.9rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }

    input:focus,
    textarea:focus {
      border-color: #555;
      background: #fff;
    }

    input.invalid,
    textarea.invalid {
      border-color: #c0392b;
    }

    textarea {
      resize: vertical;
      min-height: 130px;
    }

    .field-error {
      font-size: 0.78rem;
      color: #c0392b;
      display: none;
    }

    .field-error.visible { display: block; }

    .submit-btn {
      align-self: flex-start;
      padding: 0.65rem 1.6rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #333; }

    .success-msg {
      display: none;
      background: #eafaf1;
      border: 1px solid #a9dfbf;
      color: #1e8449;
      border-radius: 6px;
      padding: 0.9rem 1rem;
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    .success-msg.visible { display: block; }

    @media (prefers-color-scheme: dark) {
      .contact-card {
        background: #242424;
        border-color: #333;
      }

      label { color: #aaa; }

      input[type="text"],
      input[type="email"],
      textarea {
        background: #1a1a1a;
        border-color: #444;
        color: #e5e5e5;
      }

      input:focus, textarea:focus {
        border-color: #888;
        background: #222;
      }

      .submit-btn { background: #e5e5e5; color: #111; }
      .submit-btn:hover { background: #ccc; }

      .success-msg {
        background: #1a2e22;
        border-color: #2e7d4f;
        color: #6fcf97;
      }
    }
  </style>
</head>
<body>

  <header>
    <a class="site-title" href="/">MySite</a>
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="contact-card">
      <h2>Get in touch</h2>
      <p>Fill out the form below and I'll get back to you as soon as possible.</p>

      <form id="contact-form" novalidate>
        <div class="form-group">

          <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Jane Smith" autocomplete="name">
            <span class="field-error" id="name-error">Please enter your name.</span>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="jane@example.com" autocomplete="email">
            <span class="field-error" id="email-error">Please enter a valid email address.</span>
          </div>

          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" placeholder="Your message…"></textarea>
            <span class="field-error" id="message-error">Please enter a message.</span>
          </div>

          <button type="submit" class="submit-btn">Send Message</button>
        </div>
      </form>

      <div class="success-msg" id="success-msg">
        Message sent! Thanks for reaching out — I'll be in touch soon.
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('contact-form');

    function validate() {
      const name    = document.getElementById('name');
      const email   = document.getElementById('email');
      const message = document.getElementById('message');
      let valid = true;

      function check(input, errorId, condition) {
        const err = document.getElementById(errorId);
        if (condition) {
          input.classList.remove('invalid');
          err.classList.remove('visible');
        } else {
          input.classList.add('invalid');
          err.classList.add('visible');
          valid = false;
        }
      }

      check(name,    'name-error',    name.value.trim().length > 0);
      check(email,   'email-error',   /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim()));
      check(message, 'message-error', message.value.trim().length > 0);

      return valid;
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      if (!validate()) return;

      // Simulate submission — wire up to a real endpoint or service when ready
      form.style.display = 'none';
      document.getElementById('success-msg').classList.add('visible');
    });

    // Clear error state on input
    ['name', 'email', 'message'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        const el = document.getElementById(id);
        el.classList.remove('invalid');
        document.getElementById(`${id}-error`).classList.remove('visible');
      });
    });
  </script>

</body>
</html>
